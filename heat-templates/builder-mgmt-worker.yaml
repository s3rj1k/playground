heat_template_version: 2021-04-16

description: Template for 3 VMs (builder, mgmt, worker) with a primary LB network and a secondary local-only network

parameters:
  prefix:
    type: string
    description: "Resource name prefix"
    label: "Resource name prefix"
    constraints:
      - length:
          min: 1
          max: 32
        description: "Resource name prefix must be between 1 and 32 characters"
      - allowed_pattern: "^[a-zA-Z0-9-_]+$"
        description: "Resource name prefix can only contain letters, numbers, underscore and hyphen"

  image_id:
    type: string
    description: "Image to use for the instances."
    default: debian-13-generic-amd64
    label: "Server Image"
    constraints:
      - allowed_values:
          - debian-13-generic-amd64
        description: "Must be a known Image ID"

  ssh_pub_key:
    type: string
    description: "SSH public key for instance access"
    label: "SSH Public Key"
    constraints:
      - length:
          min: 1

  external_network:
    type: string
    description: "External network for router gateway"
    default: "public"
    label: "External Network"

  network_cidr:
    type: string
    description: "CIDR for the primary network"
    default: "10.42.71.0/24"
    label: "Primary Network CIDR"

  allocation_pool_start:
    type: string
    description: "Start of IP allocation pool for the primary network"
    default: "10.42.71.200"
    label: "Allocation Pool Start"

  allocation_pool_stop:
    type: string
    description: "End of IP allocation pool for the primary network"
    default: "10.42.71.250"
    label: "Allocation Pool Stop"

  lb_ip:
    type: string
    description: "Virtual IP for the LoadBalancer on the primary network (Cilium L2 / Traefik)"
    default: "10.42.71.100"
    label: "LB VIP"

  builder_ip:
    type: string
    description: "Primary network IP address for the builder VM"
    default: "10.42.71.101"
    label: "Builder IP"

  mgmt_ip:
    type: string
    description: "Primary network IP address for the mgmt VM"
    default: "10.42.71.102"
    label: "Mgmt IP"

  worker_ip:
    type: string
    description: "Primary network IP address for the worker VM"
    default: "10.42.71.103"
    label: "Worker IP"

  secondary_network_cidr:
    type: string
    description: "CIDR for the secondary (local-only) network"
    default: "192.168.42.0/24"
    label: "Secondary Network CIDR"

  secondary_allocation_pool_start:
    type: string
    description: "Start of IP allocation pool for the secondary network"
    default: "192.168.42.200"
    label: "Secondary Allocation Pool Start"

  secondary_allocation_pool_stop:
    type: string
    description: "End of IP allocation pool for the secondary network"
    default: "192.168.42.250"
    label: "Secondary Allocation Pool Stop"

  builder_secondary_ip:
    type: string
    description: "Secondary network IP address for the builder VM"
    default: "192.168.42.101"
    label: "Builder Secondary IP"

  mgmt_secondary_ip:
    type: string
    description: "Secondary network IP address for the mgmt VM"
    default: "192.168.42.102"
    label: "Mgmt Secondary IP"

  worker_secondary_ip:
    type: string
    description: "Secondary network IP address for the worker VM"
    default: "192.168.42.103"
    label: "Worker Secondary IP"

  availability_zone:
    type: string
    description: "Availability zone for instances"
    default: "nova"
    label: "Availability Zone"

  builder_flavor:
    type: string
    description: "Flavor for the builder instance"
    default: "re.jenkins.slave.big"
    label: "Builder Instance Flavor"

  mgmt_flavor:
    type: string
    description: "Flavor for the mgmt instance"
    default: "a1.large"
    label: "Mgmt Instance Flavor"

  worker_flavor:
    type: string
    description: "Flavor for the worker instance"
    default: "a1.large"
    label: "Worker Instance Flavor"

  builder_volume_size:
    type: number
    description: "Size of root volume for the builder node in GB (big)"
    default: 500
    label: "Builder Volume Size"

  mgmt_volume_size:
    type: number
    description: "Size of root volume for the mgmt node in GB (moderate)"
    default: 200
    label: "Mgmt Volume Size"

  worker_volume_size:
    type: number
    description: "Size of root volume for the worker node in GB (normal)"
    default: 80
    label: "Worker Volume Size"

resources:
  ssh_authorized_keys:
    type: "OS::Heat::Value"
    properties:
      value:
        - { get_param: ssh_pub_key }

  # Primary network (external connectivity + floating IPs + LB VIP)
  network:
    type: "OS::Neutron::Net"
    properties:
      name:
        str_replace:
          template: $prefix-network
          params:
            $prefix:
              get_param: prefix
      port_security_enabled: false
      admin_state_up: true
      availability_zone_hints:
        - get_param: availability_zone

  subnet:
    type: "OS::Neutron::Subnet"
    properties:
      name:
        str_replace:
          template: $prefix-subnet
          params:
            $prefix:
              get_param: prefix
      network_id:
        get_resource: network
      cidr:
        get_param: network_cidr
      ip_version: 4
      enable_dhcp: true
      allocation_pools:
        - start:
            get_param: allocation_pool_start
          end:
            get_param: allocation_pool_stop

  router:
    type: "OS::Neutron::Router"
    properties:
      name:
        str_replace:
          template: $prefix-router
          params:
            $prefix:
              get_param: prefix
      admin_state_up: true
      external_gateway_info:
        network:
          get_param: external_network

  router_interface:
    type: "OS::Neutron::RouterInterface"
    properties:
      router_id:
        get_resource: router
      subnet_id:
        get_resource: subnet

  # Secondary network (local communication only: no router, no gateway, DHCP off)
  secondary_network:
    type: "OS::Neutron::Net"
    properties:
      name:
        str_replace:
          template: $prefix-secondary-network
          params:
            $prefix:
              get_param: prefix
      port_security_enabled: false
      admin_state_up: true
      availability_zone_hints:
        - get_param: availability_zone

  secondary_subnet:
    type: "OS::Neutron::Subnet"
    properties:
      name:
        str_replace:
          template: $prefix-secondary-subnet
          params:
            $prefix:
              get_param: prefix
      network_id:
        get_resource: secondary_network
      cidr:
        get_param: secondary_network_cidr
      ip_version: 4
      enable_dhcp: false
      gateway_ip: null
      allocation_pools:
        - start:
            get_param: secondary_allocation_pool_start
          end:
            get_param: secondary_allocation_pool_stop

  # LB VIP on the primary network (reserves the IP; reachable via its own floating IP)
  port_lb:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-port-lb
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: subnet
          ip_address:
            get_param: lb_ip

  floating_ip_lb:
    type: "OS::Neutron::FloatingIP"
    properties:
      floating_network:
        get_param: external_network
      port_id:
        get_resource: port_lb

  # Builder VM (big disk)
  port_builder:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-port-builder
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: subnet
          ip_address:
            get_param: builder_ip

  secondary_port_builder:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-secondary-port-builder
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: secondary_network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: secondary_subnet
          ip_address:
            get_param: builder_secondary_ip

  floating_ip_builder:
    type: "OS::Neutron::FloatingIP"
    properties:
      floating_network:
        get_param: external_network
      port_id:
        get_resource: port_builder

  builder_wait_handle:
    type: "OS::Heat::WaitConditionHandle"

  builder_wait_condition:
    type: "OS::Heat::WaitCondition"
    properties:
      handle:
        get_resource: builder_wait_handle
      timeout: 3600

  builder_user_data:
    type: "OS::Heat::Value"
    properties:
      value:
        str_replace:
          template: |
            #cloud-config

            # https://cloudinit.readthedocs.io/en/24.1/reference/examples.html
            # Logs are in:
            #  - /var/log/cloud-init.log
            #  - /var/log/cloud-init-output.log

            users:
              - name: root
                shell: /bin/bash
                lock_passwd: false
                plain_text_passwd: root
                ssh_authorized_keys: %ssh_keys%
              - name: user
                shell: /bin/bash
                lock_passwd: true
                sudo: ALL=(ALL) NOPASSWD:ALL
                ssh_authorized_keys: %ssh_keys%

            runcmd:
              - |
                export DEBIAN_FRONTEND=noninteractive

                # Detect OS type
                if [ -f /etc/os-release ]; then
                  . /etc/os-release
                  OS_ID="${ID}"
                else
                  OS_ID="unknown"
                fi

                # Perform OS-specific updates
                case "${OS_ID}" in
                  debian)
                    apt-get update
                    apt-get -y \
                      -o Dpkg::Options::="--force-confdef" \
                      -o Dpkg::Options::="--force-confold" \
                      upgrade
                    ;;
                  *)
                    echo "Unknown OS: ${OS_ID}, skipping package updates"
                    ;;
                esac

                # Configure SSH
                sed -i \
                  -e '/^[[:space:]]*#*[[:space:]]*Include/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PermitRootLogin/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PasswordAuthentication/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PermitEmptyPasswords/d' \
                  -e '$a\PermitRootLogin prohibit-password' \
                  -e '$a\PasswordAuthentication no' \
                  -e '$a\PermitEmptyPasswords no' \
                  /etc/ssh/sshd_config

                # Restart SSH service
                systemctl restart sshd || systemctl restart ssh

                RESULT=$?

                if [ $RESULT -eq 0 ]; then
                  %wc_notify% --data-binary "{\"status\": \"SUCCESS\", \"data\": \"Builder cloud-init completed\"}"
                else
                  %wc_notify% --data-binary "{\"status\": \"FAILURE\", \"reason\": \"Builder cloud-init failed\"}"
                  exit 1
                fi
          params:
            "%ssh_keys%":
              get_attr:
                - ssh_authorized_keys
                - value
            "%wc_notify%":
              get_attr:
                - builder_wait_handle
                - curl_cli

  builder:
    type: "OS::Nova::Server"
    properties:
      name:
        str_replace:
          template: "%prefix%-builder"
          params:
            "%prefix%":
              get_param: prefix
      availability_zone:
        get_param: availability_zone
      flavor:
        get_param: builder_flavor
      config_drive: true
      block_device_mapping_v2:
        - image_id:
            get_param: image_id
          delete_on_termination: true
          boot_index: 0
          volume_size:
            get_param: builder_volume_size
      networks:
        - port:
            get_resource: port_builder
        - port:
            get_resource: secondary_port_builder
      user_data_format: RAW
      user_data:
        get_attr:
          - builder_user_data
          - value

  # Mgmt VM (moderate disk)
  port_mgmt:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-port-mgmt
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: subnet
          ip_address:
            get_param: mgmt_ip

  secondary_port_mgmt:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-secondary-port-mgmt
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: secondary_network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: secondary_subnet
          ip_address:
            get_param: mgmt_secondary_ip

  floating_ip_mgmt:
    type: "OS::Neutron::FloatingIP"
    properties:
      floating_network:
        get_param: external_network
      port_id:
        get_resource: port_mgmt

  mgmt_wait_handle:
    type: "OS::Heat::WaitConditionHandle"

  mgmt_wait_condition:
    type: "OS::Heat::WaitCondition"
    properties:
      handle:
        get_resource: mgmt_wait_handle
      timeout: 3600

  mgmt_user_data:
    type: "OS::Heat::Value"
    properties:
      value:
        str_replace:
          template: |
            #cloud-config

            # https://cloudinit.readthedocs.io/en/24.1/reference/examples.html
            # Logs are in:
            #  - /var/log/cloud-init.log
            #  - /var/log/cloud-init-output.log

            users:
              - name: root
                shell: /bin/bash
                lock_passwd: false
                plain_text_passwd: root
                ssh_authorized_keys: %ssh_keys%
              - name: user
                shell: /bin/bash
                lock_passwd: true
                sudo: ALL=(ALL) NOPASSWD:ALL
                ssh_authorized_keys: %ssh_keys%

            runcmd:
              - |
                export DEBIAN_FRONTEND=noninteractive

                # Detect OS type
                if [ -f /etc/os-release ]; then
                  . /etc/os-release
                  OS_ID="${ID}"
                else
                  OS_ID="unknown"
                fi

                # Perform OS-specific updates
                case "${OS_ID}" in
                  debian)
                    apt-get update
                    apt-get -y \
                      -o Dpkg::Options::="--force-confdef" \
                      -o Dpkg::Options::="--force-confold" \
                      upgrade
                    ;;
                  *)
                    echo "Unknown OS: ${OS_ID}, skipping package updates"
                    ;;
                esac

                # Configure SSH
                sed -i \
                  -e '/^[[:space:]]*#*[[:space:]]*Include/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PermitRootLogin/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PasswordAuthentication/d' \
                  -e '/^[[:space:]]*#*[[:space:]]*PermitEmptyPasswords/d' \
                  -e '$a\PermitRootLogin prohibit-password' \
                  -e '$a\PasswordAuthentication no' \
                  -e '$a\PermitEmptyPasswords no' \
                  /etc/ssh/sshd_config

                # Restart SSH service
                systemctl restart sshd || systemctl restart ssh

                RESULT=$?

                if [ $RESULT -eq 0 ]; then
                  %wc_notify% --data-binary "{\"status\": \"SUCCESS\", \"data\": \"Mgmt cloud-init completed\"}"
                else
                  %wc_notify% --data-binary "{\"status\": \"FAILURE\", \"reason\": \"Mgmt cloud-init failed\"}"
                  exit 1
                fi
          params:
            "%ssh_keys%":
              get_attr:
                - ssh_authorized_keys
                - value
            "%wc_notify%":
              get_attr:
                - mgmt_wait_handle
                - curl_cli

  mgmt:
    type: "OS::Nova::Server"
    properties:
      name:
        str_replace:
          template: "%prefix%-mgmt"
          params:
            "%prefix%":
              get_param: prefix
      availability_zone:
        get_param: availability_zone
      flavor:
        get_param: mgmt_flavor
      config_drive: true
      block_device_mapping_v2:
        - image_id:
            get_param: image_id
          delete_on_termination: true
          boot_index: 0
          volume_size:
            get_param: mgmt_volume_size
      networks:
        - port:
            get_resource: port_mgmt
        - port:
            get_resource: secondary_port_mgmt
      user_data_format: RAW
      user_data:
        get_attr:
          - mgmt_user_data
          - value

  # Worker VM (normal disk)
  port_worker:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-port-worker
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: subnet
          ip_address:
            get_param: worker_ip

  secondary_port_worker:
    type: "OS::Neutron::Port"
    properties:
      name:
        str_replace:
          template: $prefix-secondary-port-worker
          params:
            $prefix:
              get_param: prefix
      network:
        get_resource: secondary_network
      admin_state_up: true
      port_security_enabled: false
      fixed_ips:
        - subnet:
            get_resource: secondary_subnet
          ip_address:
            get_param: worker_secondary_ip

  floating_ip_worker:
    type: "OS::Neutron::FloatingIP"
    properties:
      floating_network:
        get_param: external_network
      port_id:
        get_resource: port_worker

  worker_wait_handle:
    type: "OS::Heat::WaitConditionHandle"

  worker_wait_condition:
    type: "OS::Heat::WaitCondition"
    properties:
      handle:
        get_resource: worker_wait_handle
      timeout: 3600

  worker_user_data:
    type: "OS::Heat::Value"
    properties:
      value:
        str_replace:
          template: |
            #cloud-config

            # https://cloudinit.readthedocs.io/en/24.1/reference/examples.html
            # Logs are in:
            #  - /var/log/cloud-init.log
            #  - /var/log/cloud-init-output.log

            users:
              - name: root
                shell: /bin/bash
                lock_passwd: false
                plain_text_passwd: root
                ssh_authorized_keys: %ssh_keys%
              - name: user
                shell: /bin/bash
                lock_passwd: true
