      config_drive: true
      block_device_mapping_v2:
        - image_id:
            get_param: image_id
          delete_on_termination: true
          boot_index: 0
          volume_size:
            get_param: worker_volume_size
      networks:
        - port:
            get_resource: port_worker
        - port:
            get_resource: secondary_port_worker
      user_data_format: RAW
      user_data:
        get_attr:
          - worker_user_data
          - value

outputs:
  lb_floating_ip:
    description: Floating IP address for the LoadBalancer VIP (primary network)
    value:
      get_attr:
        - floating_ip_lb
        - floating_ip_address

  builder_floating_ip:
    description: Floating IP address for the builder VM (primary network)
    value:
      get_attr:
        - floating_ip_builder
        - floating_ip_address

  mgmt_floating_ip:
    description: Floating IP address for the mgmt VM (primary network)
    value:
      get_attr:
        - floating_ip_mgmt
        - floating_ip_address

  worker_floating_ip:
    description: Floating IP address for the worker VM (primary network)
    value:
      get_attr:
        - floating_ip_worker
        - floating_ip_address

  builder_secondary_ip:
    description: Secondary (local-only) network IP for the builder VM
    value:
      get_param: builder_secondary_ip

  mgmt_secondary_ip:
    description: Secondary (local-only) network IP for the mgmt VM
    value:
      get_param: mgmt_secondary_ip

  worker_secondary_ip:
    description: Secondary (local-only) network IP for the worker VM
    value:
      get_param: worker_secondary_ip

  builder_user_data:
    description: Rendered builder user-data
    value:
      get_attr:
        - builder_user_data
        - value

  mgmt_user_data:
    description: Rendered mgmt user-data
    value:
      get_attr:
        - mgmt_user_data
        - value

  worker_user_data:
    description: Rendered worker user-data
    value:
      get_attr:
        - worker_user_data
        - value
