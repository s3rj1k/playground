[Content]
Packages=
	containerd.io
	kubeadm
	kubectl
	kubelet

[Build]
# mkosi runs the package manager from outside the image, so profile-specific apt
# sources (e.g. the Kubernetes repo) must be exposed to the sandbox as well, not
# just the skeleton/buildroot. See mkosi(1) SandboxTrees=.
SandboxTrees=
    mkosi.skeleton
    ../../mkosi.sandbox
